<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>北歐行 · 家庭旅程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,560;0,9..144,680;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070B16;
    --bg-elev:#101A2C;
    --bg-elev-2:#16223A;
    --ink:#EAF4FF;
    --ink-soft:#B7C7DE;
    --mist:#728099;
    --line: rgba(255,255,255,.10);
    --neon-cyan:#2DE2E6;
    --neon-violet:#A06CFF;
    --neon-pink:#FF5DA2;
    --neon-amber:#FFC857;
    --danger:#FF6B6B;
    --radius:16px;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 10px 34px rgba(0,0,0,.45);
    --glow-cyan: 0 0 18px rgba(45,226,230,.45);
    --glow-violet: 0 0 18px rgba(160,108,255,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;}
  ::selection{background:var(--neon-violet);color:#fff;}

  /* ---------- App shell ---------- */
  #app{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{
    position:relative;
    padding:22px 18px 16px;
    background:#070B16;
    color:var(--ink);
    overflow:hidden;
    isolation:isolate;
  }
  .topbar::before, .topbar::after{
    content:''; position:absolute; width:280px; height:280px; border-radius:50%; filter:blur(60px);
    opacity:.5; z-index:-1; mix-blend-mode:screen;
  }
  .topbar::before{
    background:radial-gradient(circle, var(--neon-cyan), transparent 70%);
    top:-140px; left:-60px; animation:driftA 16s ease-in-out infinite alternate;
  }
  .topbar::after{
    background:radial-gradient(circle, var(--neon-violet), transparent 70%);
    top:-120px; right:-80px; animation:driftB 13s ease-in-out infinite alternate;
  }
  @keyframes driftA{ from{transform:translate(0,0) scale(1);} to{transform:translate(40px,30px) scale(1.15);} }
  @keyframes driftB{ from{transform:translate(0,0) scale(1.1);} to{transform:translate(-30px,20px) scale(.95);} }
  @media (prefers-reduced-motion: reduce){
    .topbar::before, .topbar::after{ animation:none; }
  }
  .topbar .skyline{
    position:absolute; left:0; right:0; bottom:0; height:34px;
    opacity:.4; pointer-events:none;
  }
  .topbar-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1;}
  .trip-name{
    font-family:'Fraunces',serif; font-weight:560; font-size:26px; letter-spacing:.2px;
    margin:0 0 4px;
    text-shadow:0 0 22px rgba(45,226,230,.35);
  }
  .trip-dates{
    font-size:12px; letter-spacing:.06em; color:#9FE8E2; opacity:.9;
  }
  .countdown{
    text-align:right; flex-shrink:0;
  }
  .countdown .num{font-family:'Fraunces',serif; font-size:30px; font-weight:680; line-height:1;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 10px rgba(160,108,255,.45));}
  .countdown .lbl{font-size:10px; letter-spacing:.12em; color:#8FA3BE; text-transform:uppercase; margin-top:2px;}
  .aurora-rule{height:3px; margin-top:16px; border-radius:3px;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-violet),var(--neon-pink));
    box-shadow:0 0 14px rgba(160,108,255,.55);
    position:relative; z-index:1;}

  .members-row{display:flex; gap:6px; margin-top:12px; position:relative; z-index:1; flex-wrap:wrap;}
  .member-chip{font-size:11px; padding:4px 10px; border-radius:99px; background:rgba(45,226,230,.08);
    color:#CFEFEF; border:1px solid rgba(45,226,230,.3);}

  main{flex:1; padding:16px 16px 96px; max-width:760px; width:100%; margin:0 auto;}

  /* ---------- Cards ---------- */
  .card{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px;}
  .section-title{font-family:'Fraunces',serif; font-weight:560; font-size:18px; margin:22px 0 10px; display:flex; align-items:center; gap:8px; color:var(--ink);}
  .section-title:first-child{margin-top:4px;}

  /* ---------- Day chips ---------- */
  .day-scroll{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 10px; scrollbar-width:none;}
  .day-scroll::-webkit-scrollbar{display:none;}
  .day-chip{
    flex-shrink:0; padding:10px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--bg-elev); cursor:pointer; text-align:left; min-width:64px;
  }
  .day-chip .d{font-size:10px; color:var(--mist); letter-spacing:.08em; text-transform:uppercase;}
  .day-chip .n{font-family:'Fraunces',serif; font-size:18px; font-weight:680; color:var(--ink);}
  .day-chip.active{
    background:linear-gradient(135deg, rgba(45,226,230,.16), rgba(160,108,255,.16));
    border-color:var(--neon-cyan); box-shadow:var(--glow-cyan);
  }
  .day-chip.active .d{color:var(--neon-cyan);}
  .day-chip.active .n{color:#fff;}

  /* ---------- Timeline ---------- */
  .timeline{position:relative; padding-left:26px; margin-top:6px;}
  .timeline::before{
    content:''; position:absolute; left:9px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(180deg,var(--neon-cyan),var(--neon-violet),var(--neon-pink));
    border-radius:2px; opacity:.7; box-shadow:0 0 10px rgba(45,226,230,.4);
  }
  .t-item{position:relative; margin-bottom:14px;}
  .t-item::before{
    content:''; position:absolute; left:-22px; top:18px; width:10px; height:10px; border-radius:50%;
    background:var(--bg); border:2px solid var(--neon-cyan); z-index:1; box-shadow:0 0 10px rgba(45,226,230,.7);
  }
  .t-card{background:var(--bg-elev); border:1px solid var(--line); border-radius:14px; padding:13px 14px;}
  .t-time{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--neon-amber); font-weight:600;}
  .t-title{font-size:15px; font-weight:600; margin:3px 0 2px; color:var(--ink);}
  .t-loc{font-size:12.5px; color:var(--mist); display:flex; align-items:center; gap:4px;}
  .t-loc a{color:var(--neon-cyan); text-decoration:none; border-bottom:1px dotted rgba(45,226,230,.4);}
  .t-notes{font-size:12.5px; color:var(--ink-soft); margin-top:6px; white-space:pre-wrap;}
  .t-actions{display:flex; gap:10px; margin-top:8px;}
  .t-actions button{background:none; border:none; font-size:11.5px; color:var(--mist); cursor:pointer; padding:0;}
  .t-actions button:hover{color:var(--danger);}

  .empty{
    text-align:center; padding:34px 16px; color:var(--mist); font-size:13.5px;
    border:1px dashed var(--line); border-radius:14px;
  }
  .empty .big{font-family:'Fraunces',serif; font-size:16px; color:var(--ink-soft); display:block; margin-bottom:4px;}

  /* ---------- Stay card ---------- */
  .stay-card{
    margin-top:16px; padding:14px 16px; border-radius:14px;
    background:linear-gradient(135deg, rgba(255,200,87,.10), rgba(160,108,255,.08));
    border:1px solid rgba(255,200,87,.35);
  }
  .stay-label{font-size:11px; letter-spacing:.08em; color:var(--neon-amber); text-transform:uppercase; margin-bottom:4px;}
  .stay-name{font-family:'Fraunces',serif; font-size:16px; font-weight:680; color:var(--ink);}
  .stay-notes{font-size:12.5px; color:var(--ink-soft); margin-top:4px; line-height:1.5;}
  .stay-map{display:inline-block; margin-top:8px; font-size:12px; color:var(--neon-amber); text-decoration:none;}
  .stay-map:hover{text-decoration:underline;}

  .drive-badge{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-family:'JetBrains Mono',monospace;
    color:var(--neon-amber); background:rgba(255,200,87,.08); border:1px solid rgba(255,200,87,.25);
    padding:6px 12px; border-radius:99px; margin-bottom:12px;
  }

  /* ---------- Lists (packing / expenses) ---------- */
  .list-row{
    display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line);
  }
  .list-row:last-child{border-bottom:none;}
  .checkbox{
    width:20px; height:20px; border-radius:6px; border:1.6px solid var(--mist); flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .checkbox.checked{background:var(--neon-cyan); border-color:var(--neon-cyan); color:#06151A; font-size:13px; box-shadow:var(--glow-cyan);}
  .row-text{flex:1; font-size:14px; color:var(--ink);}
  .row-text.done{color:var(--mist); text-decoration:line-through;}
  .row-sub{font-size:11.5px; color:var(--mist);}
  .row-del{background:none;border:none;color:var(--mist);cursor:pointer;font-size:16px;padding:4px;}
  .row-del:hover{color:var(--danger);}

  .exp-amount{font-family:'JetBrains Mono',monospace; font-weight:600; font-size:14px; color:var(--neon-amber);}
  .totals-card{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
  .total-pill{background:linear-gradient(135deg, rgba(45,226,230,.14), rgba(160,108,255,.14)); border:1px solid var(--line); color:#fff; border-radius:12px; padding:10px 14px; min-width:96px;}
  .total-pill .cur{font-size:10px; color:var(--neon-cyan); letter-spacing:.08em;}
  .total-pill .amt{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600;}

  /* ---------- Forms ---------- */
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; color:var(--mist); margin-bottom:5px; letter-spacing:.03em;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border-radius:10px; border:1.4px solid var(--line);
    font-size:14px; font-family:inherit; background:var(--bg-elev-2); color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--neon-cyan); outline-offset:1px; border-color:var(--neon-cyan); box-shadow:var(--glow-cyan);}
  .field textarea{resize:vertical; min-height:54px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 18px; border-radius:11px; border:none; cursor:pointer; font-size:14px; font-weight:600;
  }
  .btn-primary{background:linear-gradient(135deg,var(--neon-cyan),var(--neon-violet)); color:#06121A; box-shadow:0 6px 22px rgba(160,108,255,.35);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1.4px solid var(--line);}
  .btn-ghost:hover{border-color:var(--neon-cyan); color:var(--ink);}
  .btn-block{width:100%;}
  .fab{
    position:fixed; right:18px; bottom:88px; width:54px; height:54px; border-radius:50%;
    background:linear-gradient(135deg,var(--neon-cyan),var(--neon-violet));
    color:#06121A; font-size:26px; border:none; box-shadow:0 10px 28px rgba(160,108,255,.5), var(--glow-cyan); cursor:pointer; z-index:30;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }

  /* ---------- Modal ---------- */
  .modal-bg{
    position:fixed; inset:0; background:rgba(2,5,12,.65); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal{
    background:var(--bg-elev); border:1px solid var(--line); width:100%; max-width:520px; border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    box-shadow:0 -10px 40px rgba(45,226,230,.08);
  }
  @media (min-width:700px){
    .modal-bg{align-items:center;}
    .modal{border-radius:20px; max-height:80vh;}
  }
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .modal-title{font-family:'Fraunces',serif; font-size:18px; font-weight:680; color:var(--ink);}
  .modal-close{background:none; border:none; font-size:20px; color:var(--mist); cursor:pointer;}

  /* ---------- Bottom nav (mobile) ---------- */
  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; background:#0A1120; border-top:1px solid var(--line);
    display:flex; z-index:20; padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-btn{
    flex:1; border:none; background:none; padding:10px 4px 8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--mist);
  }
  .nav-btn .ic{font-size:19px;}
  .nav-btn .lb{font-size:10.5px; letter-spacing:.02em;}
  .nav-btn.active{color:var(--ink);}
  .nav-btn.active .ic{color:var(--neon-cyan); filter:drop-shadow(0 0 6px rgba(45,226,230,.7));}

  .toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--bg-elev-2); border:1px solid rgba(45,226,230,.3); color:#fff; padding:9px 16px; border-radius:99px; font-size:12.5px;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:60; box-shadow:var(--glow-cyan);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .loading-screen{
    position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; z-index:99; color:var(--mist); font-size:13px;
  }
  .spin{width:26px; height:26px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--neon-cyan);
    animation:spin .8s linear infinite; box-shadow:var(--glow-cyan);}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Desktop layout ---------- */
  @media (min-width:880px){
    #app{flex-direction:row;}
    .bottom-nav{
      position:sticky; top:0; left:auto; flex-direction:column; width:200px; height:100vh; border-top:none;
      border-right:1px solid var(--line); padding:24px 10px; gap:4px; align-items:stretch;
    }
    .nav-btn{flex-direction:row; justify-content:flex-start; gap:10px; padding:11px 12px; border-radius:10px;}
    .nav-btn.active{background:rgba(45,226,230,.08);}
    main{margin:0; max-width:680px; padding:28px 28px 60px;}
    .fab{right:40px; bottom:40px;}
    body{display:flex;}
  }
</style>
</head>
<body>
<div id="loading" class="loading-screen"><div class="spin"></div>準備行程資料中…</div>

<div id="app" style="display:none;">
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn" data-tab="itinerary"><span class="ic">🗺️</span><span class="lb">行程</span></button>
    <button class="nav-btn" data-tab="packing"><span class="ic">🎒</span><span class="lb">清單</span></button>
    <button class="nav-btn" data-tab="expenses"><span class="ic">💳</span><span class="lb">花費</span></button>
    <button class="nav-btn" data-tab="info"><span class="ic">📋</span><span class="lb">資訊</span></button>
  </nav>

  <div style="flex:1; display:flex; flex-direction:column; min-height:100vh;">
    <header class="topbar">
      <svg class="skyline" viewBox="0 0 400 34" preserveAspectRatio="none"><polyline points="0,34 0,20 18,6 34,22 50,10 70,24 90,14 110,26 130,16 150,28 170,12 190,24 210,8 230,22 250,16 270,28 290,14 310,24 330,10 350,22 370,16 400,26 400,34" fill="none" stroke="#5EEAF0" stroke-width="1.4"/></svg>
      <div class="topbar-row">
        <div>
          <h1 class="trip-name" id="tripNameDisplay">北歐家庭旅行</h1>
          <div class="trip-dates mono" id="tripDatesDisplay">尚未設定日期</div>
        </div>
        <div class="countdown">
          <div class="num" id="countdownNum">–</div>
          <div class="lbl" id="countdownLbl">天</div>
        </div>
      </div>
      <div class="members-row" id="membersRow"></div>
      <div class="aurora-rule"></div>
    </header>

    <main id="mainContent"></main>
  </div>
</div>

<button class="fab" id="fabBtn">+</button>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEYS = { trip:'trip-info', itinerary:'itinerary-items', itinVersion:'itinerary-version', packing:'packing-items', expenses:'expense-items' };
const ITINERARY_VERSION = 5;

const DEFAULT_TRIP = { name:'北歐家庭旅行', start:'2026-10-01', end:'2026-10-13', members:['Amy','Jyun','Gaga','Joie','Bill','Eve'], notes:'' };

const DEFAULT_ITINERARY = [
  { day:1, time:'23:30', title:'桃園飛布拉格', location:'桃園國際機場 第一航廈', notes:'CI67 · 23:30 TPE → 06:45 PRG（+1）· 約 13hr15min · 抵達布拉格第一航廈' },

  { day:2, time:'06:45', title:'抵達布拉格（轉機）', location:'布拉格機場 第一航廈', notes:'' },

  { day:2, time:'11:40', title:'抵達哥本哈根，市區遊玩', location:'哥本哈根 Copenhagen', notes:'' },

  { day:3, time:'11:00', title:'Avis 租車取車', location:'奧斯陸機場 Gardermoen', notes:'Mercedes Vito 九人座，手排車 · 11:00 取車（10/6 22:00 卑爾根機場還車）' },
  { day:3, time:'', title:'開車前往利勒哈默爾', location:'利勒哈默爾 Lillehammer', notes:'車程約 1hr40min' },
  { day:3, time:'', title:'開車前往 Trolltun Hotel & Hytter', location:'Trolltun Hotel & Hytter', notes:'車程約 2hr' },

  { day:4, time:'', title:'從 Trolltun 出發', location:'Trolltun Hotel & Hytter', notes:'車程約 2hr27min' },
  { day:4, time:'', title:'精靈之路 Trollstigen', location:'Trollstigen', notes:'車程約 1hr14min' },
  { day:4, time:'', title:'抵達 Dalen Apartments', location:'Dalen Apartments', notes:'' },

  { day:6, time:'', title:'從 Wangen Apartments 出發前往 Flåm', location:'Flåm', notes:'車程約 10 分鐘' },
  { day:6, time:'09:30', title:'Flåm 峽灣遊船出發', location:'Flåm 碼頭', notes:'Nærøyfjord 遊船 → Gudvangen · 11:30 抵達（2hr）' },
  { day:6, time:'12:45', title:'接駁巴士返回 Flåm', location:'Gudvangen', notes:'13:05 抵達 Flåm（20min）· 班次資訊 4131' },
  { day:6, time:'', title:'開車前往卑爾根', location:'卑爾根 Bergen', notes:'車程約 2hr30min' },
  { day:6, time:'22:00', title:'前往卑爾根機場還車', location:'卑爾根機場 Bergen Flesland', notes:'車程約 17 分鐘 · Avis 還車' },

  { day:7, time:'08:50', title:'卑爾根飛赫爾辛基', location:'卑爾根機場 Flesland', notes:'AY0922 · 08:50 BGO → 12:25 HEL · 約 1hr35min' },
  { day:7, time:'19:29', title:'夜車前往羅瓦涅米', location:'赫爾辛基中央車站', notes:'VR 火車 · 19:29 出發 → 隔日 07:20 抵達 Rovaniemi' },

  { day:8, time:'07:20', title:'抵達羅瓦涅米', location:'羅瓦涅米 Rovaniemi', notes:'' },
  { day:8, time:'', title:'聖誕老人村', location:'Santa Claus Village, Rovaniemi', notes:'' },

  { day:9, time:'09:00', title:'羅瓦涅米飛赫爾辛基', location:'羅瓦涅米機場', notes:'AY0532 · 09:00 RVN → 10:15 HEL · 約 1hr15min' },
  { day:9, time:'16:45', title:'搭乘郵輪前往斯德哥爾摩', location:'赫爾辛基 Olympia Terminal', notes:'Silja Symphony（Tallink Silja）· 16:45 出發 · A-Standard 海景艙房 · 隔日 10:00 抵達斯德哥爾摩 Värtahamnen' },

  { day:10, time:'10:00', title:'抵達斯德哥爾摩，市區遊玩', location:'斯德哥爾摩 Värtahamnen', notes:'' },

  { day:11, time:'07:40', title:'斯德哥爾摩飛倫敦', location:'斯德哥爾摩 Arlanda 第二航廈', notes:'BA779 · 07:40 ARN → 09:35 LHR · 約 2hr55min · 抵達倫敦希斯洛第五航廈' },
  { day:11, time:'', title:'倫敦市區遊玩', location:'倫敦 London', notes:'' },

  { day:12, time:'21:10', title:'倫敦飛回台灣', location:'倫敦希斯洛機場 第三航廈', notes:'CI82 · 21:10 LHR → 17:50 TPE（+1）· 約 13hr40min · 抵達桃園第一航廈' },

  { day:13, time:'17:50', title:'抵達台灣', location:'桃園國際機場 第一航廈', notes:'' }
];

const DAY_DRIVE_SUMMARY = {
  3: '3hr40min',
  4: '3hr45min',
  5: '4hr30min'
};

const STAY_BY_DAY = {
  2:  { icon:'🏨', label:'今晚住宿', name:'Comfort Hotel Copenhagen Airport', notes:'含早餐 · 大型家庭房×1（兩張單人床+兩個上下鋪）' },
  3:  { icon:'🏨', label:'今晚住宿', name:'Trolltun Hotel & Hytter', notes:'有廚房 · 一臥室公寓×2（每間一張雙人床+一個上下鋪）' },
  4:  { icon:'🏨', label:'今晚住宿', name:'Dalen Apartments', notes:'有廚房 · 雙臥室公寓×1（一張雙人床+兩張單人床+一張沙發床）' },
  5:  { icon:'🏨', label:'今晚住宿', name:'Wangen Apartments', notes:'有廚房 · 雙臥室公寓×1（兩張雙人床+一張沙發床）' },
  6:  { icon:'🏨', label:'今晚住宿', name:'Comfort Hotel Bergen Airport', notes:'含早餐 · 標準雙床房×3' },
  7:  { icon:'🚂', label:'今晚過夜', name:'北極特快車（VR 夜車）', notes:'19:29 赫爾辛基出發 → 隔日 07:20 抵達羅瓦涅米 · 車上臥舖過夜', isTransport:true },
  8:  { icon:'🏨', label:'今晚住宿', name:'Glass Resort', notes:'含早餐 + 有廚房 · 玻璃公寓×2（每間一張雙人床+一張沙發床）' },
  9:  { icon:'🚢', label:'今晚過夜', name:'詩麗雅郵輪 Silja Symphony', notes:'Tallink Silja · A-Standard 海景艙房 · 16:45 赫爾辛基出發 → 隔日 10:00 抵達斯德哥爾摩 · 船上過夜', isTransport:true },
  10: { icon:'🏨', label:'今晚住宿', name:'Clarion Hotel Arlanda Airport Terminal', notes:'含早餐 · 雙人房×1 + 家庭房×1（一張雙人床+一張沙發床）' },
  11: { icon:'🏨', label:'今晚住宿', name:'Native Hyde Park', notes:'有廚房 · 一臥室公寓×2（每間一張雙人床+一張沙發床）' }
};

let state = {
  trip: { ...DEFAULT_TRIP },
  itinerary: [],
  packing: [],
  expenses: [],
  activeTab: 'itinerary',
  activeDay: 1
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function loadAll(){
  let needsSeedTrip = false;
  try{
    const t = await window.storage.get(STORAGE_KEYS.trip, true);
    if(t) state.trip = JSON.parse(t.value); else needsSeedTrip = true;
  }catch(e){ needsSeedTrip = true; }

  let storedVersion = null;
  try{
    const v = await window.storage.get(STORAGE_KEYS.itinVersion, true);
    storedVersion = v ? Number(v.value) : null;
  }catch(e){ storedVersion = null; }

  if(storedVersion !== ITINERARY_VERSION){
    state.itinerary = DEFAULT_ITINERARY.map(it=>({ id: uid(), ...it }));
    await save('itinerary');
    try{ await window.storage.set(STORAGE_KEYS.itinVersion, String(ITINERARY_VERSION), true); }catch(e){}
  } else {
    try{
      const i = await window.storage.get(STORAGE_KEYS.itinerary, true);
      state.itinerary = i ? JSON.parse(i.value) : DEFAULT_ITINERARY.map(it=>({ id: uid(), ...it }));
    }catch(e){ state.itinerary = DEFAULT_ITINERARY.map(it=>({ id: uid(), ...it })); }
  }

  try{
    const p = await window.storage.get(STORAGE_KEYS.packing, true);
    if(p) state.packing = JSON.parse(p.value);
  }catch(e){}
  try{
    const ex = await window.storage.get(STORAGE_KEYS.expenses, true);
    if(ex) state.expenses = JSON.parse(ex.value);
  }catch(e){}

  if(needsSeedTrip){ state.trip = { ...DEFAULT_TRIP }; await save('trip'); }
}


async function save(key){
  try{
    await window.storage.set(STORAGE_KEYS[key], JSON.stringify(state[key]), true);
    showToast('已同步');
  }catch(e){ showToast('儲存失敗，請再試一次'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1600);
}

function tripDayCount(){
  if(!state.trip.start || !state.trip.end) return 1;
  const s = new Date(state.trip.start), e = new Date(state.trip.end);
  return Math.max(1, Math.round((e-s)/86400000)+1);
}
function dayDate(dayNum){
  if(!state.trip.start) return '';
  const d = new Date(state.trip.start);
  d.setDate(d.getDate()+dayNum-1);
  return d.toLocaleDateString('zh-TW',{month:'short',day:'numeric',weekday:'short'});
}

function renderHeader(){
  document.getElementById('tripNameDisplay').textContent = state.trip.name || '北歐家庭旅行';
  document.getElementById('tripDatesDisplay').textContent = (state.trip.start && state.trip.end)
    ? `${state.trip.start} → ${state.trip.end} · 共 ${tripDayCount()} 天` : '尚未設定日期，點「資訊」設定';
  const cd = document.getElementById('countdownNum'), lbl = document.getElementById('countdownLbl');
  if(state.trip.start){
    const days = Math.ceil((new Date(state.trip.start)-new Date(new Date().toDateString()))/86400000);
    if(days>0){ cd.textContent=days; lbl.textContent='天後出發'; }
    else if(days===0){ cd.textContent='✈'; lbl.textContent='今天出發'; }
    else if(-days < tripDayCount()){ cd.textContent='●'; lbl.textContent='旅行中'; }
    else { cd.textContent='✓'; lbl.textContent='已結束'; }
  } else { cd.textContent='–'; lbl.textContent='設定日期'; }

  const mr = document.getElementById('membersRow');
  mr.innerHTML = state.trip.members.map(m=>`<span class="member-chip">${escapeHtml(m)}</span>`).join('')
    || `<span class="member-chip" style="opacity:.6">尚未新增家人</span>`;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

function setActiveNav(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));
  document.getElementById('fabBtn').style.display = (state.activeTab==='packing' || state.activeTab==='expenses') ? 'flex' : 'none';
}

let itinScrollPos = 0;

function render(){
  renderHeader(); setActiveNav();
  const main = document.getElementById('mainContent');
  if(state.activeTab==='itinerary'){
    main.innerHTML = renderItinerary();
    const ds = document.getElementById('dayScroll');
    if(ds) ds.scrollLeft = itinScrollPos;
  }
  else if(state.activeTab==='packing') main.innerHTML = renderPacking();
  else if(state.activeTab==='expenses') main.innerHTML = renderExpenses();
  else main.innerHTML = renderInfo();
  attachDynamicHandlers();
}

/* ---------------- Itinerary ---------------- */
function renderItinerary(){
  const total = tripDayCount();
  const chips = Array.from({length: total}, (_,idx)=>{
    const day = idx+1;
    return `<button class="day-chip ${day===state.activeDay?'active':''}" data-day="${day}">
      <div class="d">${dayDate(day) || 'DAY'}</div>
      <div class="n">D${day}</div>
    </button>`;
  }).join('');

  const items = state.itinerary.filter(it=>it.day===state.activeDay);
  const list = items.length ? `<div class="timeline">${items.map(it=>`
    <div class="t-item">
      <div class="t-card">
        ${it.time?`<div class="t-time">${escapeHtml(it.time)}</div>`:''}
        <div class="t-title">${escapeHtml(it.title)}</div>
        ${it.location?`<div class="t-loc">📍 <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.location)}" target="_blank" rel="noopener">${escapeHtml(it.location)}</a></div>`:''}
        ${it.notes?`<div class="t-notes">${escapeHtml(it.notes)}</div>`:''}
      </div>
    </div>`).join('')}</div>`
    : `<div class="empty"><span class="big">這天還沒有安排</span>之後補上行程就會顯示在這裡</div>`;

  const driveTotal = DAY_DRIVE_SUMMARY[state.activeDay];
  const driveBadge = driveTotal ? `<div class="drive-badge">🚗 全天車程約 ${escapeHtml(driveTotal)}</div>` : '';

  const stay = STAY_BY_DAY[state.activeDay];
  const stayCard = stay ? `
    <div class="stay-card">
      <div class="stay-label">${stay.icon} ${stay.label}</div>
      <div class="stay-name">${escapeHtml(stay.name)}</div>
      ${stay.notes?`<div class="stay-notes">${escapeHtml(stay.notes)}</div>`:''}
      ${stay.isTransport?'':`<a class="stay-map" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stay.name)}" target="_blank" rel="noopener">在地圖上查看 →</a>`}
    </div>` : '';

  return `
    <div class="section-title">行程時間軸</div>
    <div class="day-scroll" id="dayScroll">${chips}</div>
    ${driveBadge}
    ${list}
    ${stayCard}
  `;
}

/* ---------------- Packing ---------------- */
function renderPacking(){
  const done = state.packing.filter(p=>p.done).length;
  const rows = state.packing.length ? state.packing.map(p=>`
    <div class="list-row">
      <div class="checkbox ${p.done?'checked':''}" data-toggle-pack="${p.id}">${p.done?'✓':''}</div>
      <div style="flex:1">
        <div class="row-text ${p.done?'done':''}">${escapeHtml(p.text)}</div>
        ${p.assignee?`<div class="row-sub">${escapeHtml(p.assignee)}</div>`:''}
      </div>
      <button class="row-del" data-del-pack="${p.id}">✕</button>
    </div>`).join('')
    : `<div class="empty"><span class="big">清單是空的</span>按右下角 + 新增要帶的東西</div>`;

  return `
    <div class="section-title">打包清單${state.packing.length?` <span class="mono" style="font-size:12px;color:var(--mist);font-weight:400;">(${done}/${state.packing.length})</span>`:''}</div>
    <div class="card">${rows}</div>
  `;
}

/* ---------------- Expenses ---------------- */
function renderExpenses(){
  const totals = {};
  state.expenses.forEach(e=>{ totals[e.currency] = (totals[e.currency]||0) + Number(e.amount||0); });
  const totalPills = Object.keys(totals).length ? `<div class="totals-card">${Object.entries(totals).map(([cur,amt])=>`
    <div class="total-pill"><div class="cur">${cur} 總計</div><div class="amt">${amt.toLocaleString()}</div></div>`).join('')}</div>` : '';

  const rows = state.expenses.length ? state.expenses.slice().reverse().map(e=>`
    <div class="list-row">
      <div style="flex:1">
        <div class="row-text">${escapeHtml(e.desc)}</div>
        <div class="row-sub">${e.payer?escapeHtml(e.payer)+' 先付 · ':''}${e.day?'Day '+e.day:''}</div>
      </div>
      <div class="exp-amount">${e.currency} ${Number(e.amount).toLocaleString()}</div>
      <button class="row-del" data-del-exp="${e.id}">✕</button>
    </div>`).join('')
    : `<div class="empty"><span class="big">還沒有花費記錄</span>按右下角 + 記一筆</div>`;

  return `
    <div class="section-title">花費記錄</div>
    ${totalPills}
    <div class="card">${rows}</div>
  `;
}

/* ---------------- Info / Settings ---------------- */
function renderInfo(){
  return `
    <div class="section-title">行程基本資料</div>
    <div class="card">
      <div class="field"><label>旅程名稱</label><input id="f-tripname" value="${escapeHtml(state.trip.name)}"></div>
      <div class="field-row">
        <div class="field"><label>出發日</label><input id="f-start" type="date" value="${state.trip.start||''}"></div>
        <div class="field"><label>回程日</label><input id="f-end" type="date" value="${state.trip.end||''}"></div>
      </div>
      <div class="field"><label>家人成員（用逗號分隔）</label><input id="f-members" value="${escapeHtml(state.trip.members.join('、'))}" placeholder="例如：爸爸、媽媽、妹妹"></div>
      <button class="btn btn-primary btn-block" id="saveTripInfo">儲存設定</button>
    </div>

    <div class="section-title">緊急 / 重要資訊</div>
    <div class="card">
      <div class="field"><label>備註（保險單號、緊急聯絡電話、住宿地址等）</label>
        <textarea id="f-notes" rows="6" placeholder="例如：&#10;海外急難救助電話：800-XXX-XXX&#10;旅平險保單號：XXXX&#10;Oslo 飯店地址：...">${escapeHtml(state.trip.notes||'')}</textarea>
      </div>
      <button class="btn btn-ghost btn-block" id="saveNotes">儲存備註</button>
    </div>

    <div class="section-title">行程資料同步</div>
    <div class="card" style="font-size:13px;color:var(--ink-soft);line-height:1.7;">
      <div style="margin-bottom:12px;">如果「行程」分頁顯示的內容是舊版的，按下面這顆按鈕重新套用最新版本（航班／船班／飯店資訊）。</div>
      <button class="btn btn-ghost btn-block" id="resetItinBtn">重新套用最新行程</button>
    </div>

    <div class="section-title">小提醒</div>
    <div class="card" style="font-size:13px;color:var(--ink-soft);line-height:1.7;">
      這個 App 的資料是雲端共享的 —— 家人打開同一個連結，看到的會是同一份行程、清單與花費紀錄，互相新增或打勾都會同步喔。
    </div>
  `;
}

/* ---------------- Modal forms ---------------- */
function openModal(html){
  const bg = document.createElement('div');
  bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener('click', (e)=>{ if(e.target.id==='modalBg') closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('modalBg'); if(m) m.remove(); }

function openAddModal(){
  if(state.activeTab==='packing') openAddPacking();
  else if(state.activeTab==='expenses') openAddExpense();
}

function openAddPacking(){
  openModal(`
    <div class="modal-head"><div class="modal-title">新增打包項目</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>項目</label><input id="m-text" placeholder="例如：羽絨外套"></div>
    <div class="field"><label>負責人（選填）</label><input id="m-assignee" placeholder="例如：媽媽"></div>
    <button class="btn btn-primary btn-block" id="m-save">加入清單</button>
  `);
  document.getElementById('m-save').onclick = async ()=>{
    const text = document.getElementById('m-text').value.trim();
    if(!text){ showToast('請輸入項目名稱'); return; }
    state.packing.push({ id: uid(), text, assignee: document.getElementById('m-assignee').value.trim(), done:false });
    closeModal(); render(); await save('packing');
  };
}

function openAddExpense(){
  openModal(`
    <div class="modal-head"><div class="modal-title">記一筆花費</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>項目</label><input id="m-desc" placeholder="例如：晚餐"></div>
    <div class="field-row">
      <div class="field"><label>金額</label><input id="m-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>幣別</label>
        <select id="m-currency">
          <option>NOK</option><option>SEK</option><option>DKK</option><option>EUR</option><option>ISK</option><option>USD</option><option>TWD</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>誰先付的</label><input id="m-payer" placeholder="例如：爸爸"></div>
      <div class="field"><label>第幾天（選填）</label><input id="m-day" type="number" min="1"></div>
    </div>
    <button class="btn btn-primary btn-block" id="m-save">記錄這筆</button>
  `);
  document.getElementById('m-save').onclick = async ()=>{
    const desc = document.getElementById('m-desc').value.trim();
    const amount = document.getElementById('m-amount').value;
    if(!desc || !amount){ showToast('請輸入項目與金額'); return; }
    state.expenses.push({
      id: uid(), desc, amount: Number(amount), currency: document.getElementById('m-currency').value,
      payer: document.getElementById('m-payer').value.trim(),
      day: document.getElementById('m-day').value ? Number(document.getElementById('m-day').value) : null
    });
    closeModal(); render(); await save('expenses');
  };
}

/* ---------------- Event wiring ---------------- */
function attachDynamicHandlers(){
  document.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{
    const ds = document.getElementById('dayScroll');
    if(ds) itinScrollPos = ds.scrollLeft;
    state.activeDay = Number(b.dataset.day); render();
  });
  document.querySelectorAll('[data-toggle-pack]').forEach(b=>b.onclick=async()=>{
    const p = state.packing.find(p=>p.id===b.dataset.togglePack); if(p) p.done=!p.done; render(); await save('packing');
  });
  document.querySelectorAll('[data-del-pack]').forEach(b=>b.onclick=async()=>{
    state.packing = state.packing.filter(p=>p.id!==b.dataset.delPack); render(); await save('packing');
  });
  document.querySelectorAll('[data-del-exp]').forEach(b=>b.onclick=async()=>{
    state.expenses = state.expenses.filter(e=>e.id!==b.dataset.delExp); render(); await save('expenses');
  });
  const saveTrip = document.getElementById('saveTripInfo');
  if(saveTrip) saveTrip.onclick = async ()=>{
    state.trip.name = document.getElementById('f-tripname').value.trim() || '北歐家庭旅行';
    state.trip.start = document.getElementById('f-start').value;
    state.trip.end = document.getElementById('f-end').value;
    state.trip.members = document.getElementById('f-members').value.split(/[、,，]/).map(s=>s.trim()).filter(Boolean);
    if(state.activeDay > tripDayCount()) state.activeDay = 1;
    render(); await save('trip');
  };
  const saveNotes = document.getElementById('saveNotes');
  if(saveNotes) saveNotes.onclick = async ()=>{
    state.trip.notes = document.getElementById('f-notes').value;
    render(); await save('trip');
  };
  const resetItinBtn = document.getElementById('resetItinBtn');
  if(resetItinBtn) resetItinBtn.onclick = async ()=>{
    state.itinerary = DEFAULT_ITINERARY.map(it=>({ id: uid(), ...it }));
    state.activeDay = 1;
    render(); await save('itinerary'); showToast('行程已更新為最新版本');
  };
}

document.getElementById('bottomNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn'); if(!btn) return;
  state.activeTab = btn.dataset.tab; render();
});
document.getElementById('fabBtn').addEventListener('click', openAddModal);

(async function init(){
  await loadAll();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
})();
</script>
</body>
</html>
